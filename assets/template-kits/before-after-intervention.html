<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Before / After Intervention Scaffold</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --ink: #f7f2e8;
      --muted: #aab2bd;
      --line: rgba(255,255,255,.18);
      --accent: #8ee6c8;
      --focus: #ffd166;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .stage { width: min(1120px, 100%); display: grid; gap: 18px; }
    .meta { display: flex; justify-content: space-between; gap: 16px; align-items: end; }
    h1 { margin: 0; max-width: 760px; font-size: clamp(32px, 6vw, 76px); line-height: .95; letter-spacing: 0; }
    p { margin: 0; color: var(--muted); max-width: 56ch; line-height: 1.55; }
    .compare {
      position: relative;
      overflow: hidden;
      min-height: min(62vh, 680px);
      border: 1px solid var(--line);
      background: #15191e;
      isolation: isolate;
    }
    .compare img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .after { clip-path: inset(0 calc(100% - var(--split, 50%)) 0 0); }
    .divider { position: absolute; inset: 0 auto 0 var(--split, 50%); width: 2px; background: var(--focus); z-index: 4; }
    .divider::before { content: ""; position: absolute; top: 50%; left: 50%; width: 44px; height: 44px; border: 1px solid var(--focus); border-radius: 50%; background: rgba(11,13,16,.72); transform: translate(-50%, -50%); }
    input[type="range"] { position: absolute; inset: 0; z-index: 5; opacity: 0; width: 100%; cursor: ew-resize; }
    .tag { position: absolute; z-index: 6; padding: 8px 10px; border: 1px solid var(--line); background: rgba(0,0,0,.55); color: var(--ink); font-size: 13px; }
    .tag.original { left: 16px; top: 16px; }
    .tag.proposed { right: 16px; top: 16px; }
    .hotspot { position: absolute; z-index: 7; left: var(--x); top: var(--y); translate: -50% -50%; width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--focus); background: rgba(0,0,0,.45); }
    .hotspot span { position: absolute; left: 22px; top: 50%; translate: 0 -50%; width: max-content; max-width: 220px; padding: 7px 9px; border: 1px solid var(--line); background: rgba(0,0,0,.62); color: var(--ink); font-size: 12px; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; color: var(--muted); font-size: 13px; }
    button { border: 1px solid var(--line); background: rgba(255,255,255,.06); color: var(--ink); padding: 10px 14px; cursor: pointer; }
    button:focus-visible, input:focus-visible { outline: 2px solid var(--focus); outline-offset: 3px; }
    @media (max-width: 720px) {
      main { padding: 18px; }
      .meta { display: grid; }
      .compare { min-height: 64vh; }
      .hotspot span { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <main data-source-material="replace with original client photo" data-material-transform="before-after intervention simulation">
    <section class="stage" aria-label="Before and after intervention comparison">
      <div class="meta">
        <h1>Replace with the client-specific future-state promise</h1>
        <p>Preserve the original image. Label generated assumptions. Use hotspots to explain the intervention, not decoration.</p>
      </div>
      <div class="compare" id="compare" style="--split: 50%;">
        <img src="./sample-before.jpg" alt="Original state">
        <img class="after" src="./sample-after.jpg" alt="Proposed future state">
        <div class="divider" aria-hidden="true"></div>
        <input id="split" type="range" min="0" max="100" value="50" aria-label="Compare original and proposed state">
        <div class="tag original">Original source</div>
        <div class="tag proposed">Concept visualization</div>
        <button class="hotspot" style="--x: 68%; --y: 42%;" aria-label="Focus intervention point"><span>Replace with source-anchored intervention detail</span></button>
      </div>
      <div class="controls">
        <button id="before">Before</button>
        <button id="after">After</button>
        <span>Offline truth: local folder unless images are embedded.</span>
      </div>
    </section>
  </main>
  <script>
    const compare = document.querySelector("#compare");
    const split = document.querySelector("#split");
    const setSplit = (value) => {
      compare.style.setProperty("--split", `${value}%`);
      split.value = value;
    };
    split.addEventListener("input", (event) => setSplit(event.target.value));
    document.querySelector("#before").addEventListener("click", () => setSplit(0));
    document.querySelector("#after").addEventListener("click", () => setSplit(100));
  </script>
</body>
</html>
